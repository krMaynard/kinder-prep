<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Number Sense</title>

  <!-- Google Fonts: Fredoka One (display) + Nunito (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet" />

  <!-- Shared base styles -->
  <link rel="stylesheet" href="../_shared/styles.css" />

  <style>
    /* ── App-specific layout ─────────────────────────────────── */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 0 0 env(safe-area-inset-bottom, 0);
      background: linear-gradient(160deg, #FFF8E7 0%, #FFF0D9 100%);
      overflow-y: auto;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .app-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 70px 0;
      position: relative;
    }

    .app-title {
      font-family: 'Fredoka One', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: #FF8C42;
      margin: 0;
      letter-spacing: 0.02em;
    }

    /* ── Mode tabs ───────────────────────────────────────────── */
    .mode-tabs {
      display: flex;
      gap: 12px;
      padding: 14px 16px 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .mode-tab {
      height: 56px;
      padding: 0 26px;
      border-radius: 999px;
      border: 3px solid transparent;
      background: #fff;
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.1rem;
      color: #888;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-tab:active { transform: scale(0.95); }
    .mode-tab.active {
      background: #FF8C42;
      color: #fff;
      border-color: #E06A1A;
    }

    /* ── Session progress ────────────────────────────────────── */
    .session-progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 16px 2px;
      flex-wrap: wrap;
    }

    .session-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.3s, transform 0.3s;
    }
    .session-dot.done    { background: #FF8C42; }
    .session-dot.current { background: #FF6B6B; transform: scale(1.4); }

    /* ── Main game area ──────────────────────────────────────── */
    .game-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 16px 16px 0;
    }

    /* ── Dot card (Subitize mode) ────────────────────────────── */
    .dot-card {
      width: min(260px, 72vw);
      height: min(260px, 72vw);
      background: #fff;
      border-radius: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
      display: grid;
      grid-template-areas:
        "tl . tr"
        ".  c  ."
        "bl . br";
      grid-template-rows: 1fr 1fr 1fr;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      justify-items: center;
      padding: 24px;
      position: relative;
    }

    .dot {
      width: min(40px, 10vw);
      height: min(40px, 10vw);
      border-radius: 50%;
      background: #FF6B6B;
      transition: transform 0.2s;
    }

    /* ── Tens frame (Teen Numbers mode) ─────────────────────── */
    .tens-frame-wrap {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: center;
    }

    .tens-frame {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 6px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.11);
      padding: 14px;
    }

    .frame-cell {
      width: min(40px, 9vw);
      height: min(40px, 9vw);
      border-radius: 50%;
      background: #e9e9e9;
      border: 3px solid #ddd;
      transition: background 0.2s, border-color 0.2s;
    }
    .frame-cell.filled-ten {
      background: #4FC3F7;
      border-color: #0288D1;
    }
    .frame-cell.filled-one {
      background: #FFB347;
      border-color: #E08000;
    }

    .tens-frame-label {
      font-family: 'Fredoka One', sans-serif;
      font-size: 0.95rem;
      color: #aaa;
      text-align: center;
      margin-top: 6px;
    }

    .tens-frame-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    /* ── Answer buttons row ──────────────────────────────────── */
    .answer-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 16px 16px;
      width: 100%;
    }

    .answer-btn {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      border: 4px solid transparent;
      background: #fff;
      box-shadow: 0 4px 0 rgba(0,0,0,0.14), 0 6px 16px rgba(0,0,0,0.10);
      font-family: 'Fredoka One', sans-serif;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      color: #444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.12s,
                  background 0.15s,
                  border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .answer-btn:active {
      transform: scale(0.92);
    }
    .answer-btn.correct {
      background: #D4EDDA;
      border-color: #28A745;
      color: #155724;
      animation: bounce-up 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    .answer-btn.wrong {
      animation: btn-wiggle 0.4s ease-in-out;
      background: #F8D7DA;
      border-color: #DC3545;
    }

    @keyframes bounce-up {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.22); }
      70%  { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    @keyframes btn-wiggle {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-7px); }
      40%       { transform: translateX(7px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    /* ── Reward overlay ──────────────────────────────────────── */
    #reward-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.90);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #reward-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .reward-stars {
      font-size: 4rem;
      animation: pop-in 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .reward-msg {
      font-family: 'Fredoka One', sans-serif;
      font-size: clamp(1.6rem, 6vw, 2.6rem);
      color: #FF8C42;
      text-align: center;
      padding: 0 24px;
      animation: pop-in 0.55s 0.12s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes pop-in {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .reward-continue-btn {
      animation: pop-in 0.55s 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* ── Session complete screen ─────────────────────────────── */
    #session-complete {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #FFF8E7 0%, #FFF0D9 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    #session-complete.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .session-complete-emoji {
      font-size: 5rem;
      animation: pop-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .session-complete-title {
      font-family: 'Fredoka One', sans-serif;
      font-size: clamp(1.8rem, 7vw, 3rem);
      color: #FF8C42;
      text-align: center;
      padding: 0 24px;
      animation: pop-in 0.6s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .session-stars-display {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: #888;
      animation: pop-in 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .session-play-again {
      animation: pop-in 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (min-width: 600px) {
      .dot { width: 44px; height: 44px; }
      .frame-cell { width: 44px; height: 44px; }
    }
    @media (min-width: 800px) {
      .answer-btn { width: 90px; height: 90px; }
    }
  </style>
</head>
<body>

  <!-- Home button -->
  <a href="../" class="home-btn" aria-label="Home">🏠</a>

  <!-- Header -->
  <header class="app-header">
    <h1 class="app-title">🔢 Number Sense</h1>
  </header>

  <!-- Mode tabs -->
  <div class="mode-tabs" role="navigation" aria-label="Game mode">
    <button class="mode-tab active" id="tab-subitize" aria-pressed="true">Subitize</button>
    <button class="mode-tab"        id="tab-teen"     aria-pressed="false">Teen Numbers</button>
  </div>

  <!-- Session progress dots -->
  <div class="session-progress" id="session-progress" role="list" aria-label="Session progress"></div>

  <!-- Main game area -->
  <div class="game-area" id="game-area">

    <!-- Subitize: dot card -->
    <div class="dot-card" id="dot-card" aria-label="Dot pattern" aria-live="polite"></div>

    <!-- Teen Numbers: tens frames (hidden by default) -->
    <div class="tens-frame-wrap" id="tens-frame-wrap" style="display:none;" aria-label="Tens frame" aria-live="polite">
      <div class="tens-frame-group">
        <div class="tens-frame" id="tens-frame-left"></div>
        <div class="tens-frame-label">Ten</div>
      </div>
      <div class="tens-frame-group">
        <div class="tens-frame" id="tens-frame-right"></div>
        <div class="tens-frame-label" id="ones-label">Extras</div>
      </div>
    </div>

  </div>

  <!-- Answer buttons row -->
  <div class="answer-row" id="answer-row" role="group" aria-label="Answer choices"></div>

  <!-- Reward overlay (every 5 correct) -->
  <div id="reward-overlay" role="dialog" aria-modal="true" aria-label="Great job!">
    <div class="reward-stars">⭐🌟⭐</div>
    <div class="reward-msg" id="reward-msg">Fantastic! 5 right!</div>
    <button class="btn-big btn-orange reward-continue-btn" id="reward-continue-btn">Keep Going! 🎉</button>
  </div>

  <!-- Session complete screen -->
  <div id="session-complete" role="dialog" aria-modal="true" aria-label="Session complete">
    <div class="session-complete-emoji">🏆</div>
    <div class="session-complete-title">Amazing job!</div>
    <div class="session-stars-display" id="sc-stars">You earned ⭐ 10 stars!</div>
    <button class="btn-big btn-orange session-play-again" id="play-again-btn">Play Again 🎉</button>
  </div>

  <script type="module">
  /* ============================================================
     NUMBER SENSE — Main Application
     ============================================================ */
  import { speak, speakPhrase } from '../_shared/audio.js';
  import { addStars, getStars, increment, markPracticed } from '../_shared/progress.js';

  (function () {
    'use strict';

    const APP_ID       = 'number_sense';
    const SESSION_LEN  = 10;   // problems per session
    const REWARD_EVERY = 5;    // correct answers between reward overlays

    /* ── Dice-style dot layout positions ────────────────────────
       Grid areas: tl=top-left, tr=top-right, c=center,
                   bl=bottom-left, br=bottom-right
       Each entry is an array of grid-area names to fill.
    ─────────────────────────────────────────────────────────── */
    const DOT_LAYOUTS = {
      1: [{ area: 'c' }],
      2: [{ area: 'tr' }, { area: 'bl' }],
      3: [{ area: 'tr' }, { area: 'c'  }, { area: 'bl' }],
      4: [{ area: 'tl' }, { area: 'tr' }, { area: 'bl' }, { area: 'br' }],
      5: [{ area: 'tl' }, { area: 'tr' }, { area: 'c'  }, { area: 'bl' }, { area: 'br' }],
    };

    /* ── State ───────────────────────────────────────────────── */
    let mode           = 'subitize'; // 'subitize' | 'teen'
    let currentNumber  = 0;
    let sessionCount   = 0;   // questions shown this session
    let sessionCorrect = 0;   // correct answers this session
    let correctSince   = 0;   // correct answers since last reward
    let isBusy         = false;

    /* ── DOM refs ────────────────────────────────────────────── */
    const tabSubitize      = document.getElementById('tab-subitize');
    const tabTeen          = document.getElementById('tab-teen');
    const sessionProgressEl= document.getElementById('session-progress');
    const dotCardEl        = document.getElementById('dot-card');
    const tensFrameWrapEl  = document.getElementById('tens-frame-wrap');
    const tensFrameLeftEl  = document.getElementById('tens-frame-left');
    const tensFrameRightEl = document.getElementById('tens-frame-right');
    const onesLabelEl      = document.getElementById('ones-label');
    const answerRowEl      = document.getElementById('answer-row');
    const rewardOverlay    = document.getElementById('reward-overlay');
    const rewardMsg        = document.getElementById('reward-msg');
    const rewardContinue   = document.getElementById('reward-continue-btn');
    const sessionComplete  = document.getElementById('session-complete');
    const scStars          = document.getElementById('sc-stars');
    const playAgainBtn     = document.getElementById('play-again-btn');

    /* ── Mode switching ──────────────────────────────────────── */
    tabSubitize.addEventListener('click', () => switchMode('subitize'));
    tabTeen.addEventListener('click',     () => switchMode('teen'));

    function switchMode(newMode) {
      if (newMode === mode) return;
      mode = newMode;
      tabSubitize.classList.toggle('active', mode === 'subitize');
      tabSubitize.setAttribute('aria-pressed', mode === 'subitize' ? 'true' : 'false');
      tabTeen.classList.toggle('active', mode === 'teen');
      tabTeen.setAttribute('aria-pressed', mode === 'teen' ? 'true' : 'false');
      resetSession();
    }

    /* ── Session management ──────────────────────────────────── */
    function resetSession() {
      sessionCount   = 0;
      sessionCorrect = 0;
      correctSince   = 0;
      isBusy         = false;
      sessionComplete.classList.remove('visible');
      rewardOverlay.classList.remove('visible');
      nextQuestion();
    }

    function nextQuestion() {
      if (sessionCount >= SESSION_LEN) {
        showSessionComplete();
        return;
      }
      sessionCount++;
      updateProgressDots();
      currentNumber = pickNumber();
      renderQuestion();
    }

    /* ── Pick a number appropriate to the mode ───────────────── */
    function pickNumber() {
      if (mode === 'subitize') {
        return Math.floor(Math.random() * 5) + 1; // 1–5
      } else {
        return Math.floor(Math.random() * 10) + 11; // 11–20
      }
    }

    /* ── Render the question ─────────────────────────────────── */
    function renderQuestion() {
      isBusy = false;
      if (mode === 'subitize') {
        dotCardEl.style.display     = '';
        tensFrameWrapEl.style.display = 'none';
        renderDotCard(currentNumber);
      } else {
        dotCardEl.style.display     = 'none';
        tensFrameWrapEl.style.display = '';
        renderTensFrame(currentNumber);
      }
      renderAnswerButtons();
    }

    /* ── Dot card rendering ──────────────────────────────────── */
    function renderDotCard(n) {
      dotCardEl.innerHTML = '';
      dotCardEl.setAttribute('aria-label', `${n} dot${n > 1 ? 's' : ''}`);

      const layout = DOT_LAYOUTS[n] || [];
      layout.forEach(({ area }) => {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.gridArea = area;
        dotCardEl.appendChild(dot);
      });
    }

    /* ── Tens frame rendering ────────────────────────────────── */
    function renderTensFrame(n) {
      const ones = n - 10; // how many extras in the right frame
      onesLabelEl.textContent = ones === 1 ? '1 Extra' : `${ones} Extras`;
      tensFrameWrapEl.setAttribute('aria-label', `${n}: a full ten and ${ones} more`);

      // Left frame: all 10 cells filled sky-blue
      tensFrameLeftEl.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const cell = document.createElement('div');
        cell.className = 'frame-cell filled-ten';
        tensFrameLeftEl.appendChild(cell);
      }

      // Right frame: `ones` cells filled orange, rest empty
      tensFrameRightEl.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const cell = document.createElement('div');
        cell.className = 'frame-cell' + (i < ones ? ' filled-one' : '');
        tensFrameRightEl.appendChild(cell);
      }
    }

    /* ── Answer buttons ──────────────────────────────────────── */
    function renderAnswerButtons() {
      answerRowEl.innerHTML = '';

      let choices;
      if (mode === 'subitize') {
        // Always show all 5 numerals (1–5)
        choices = [1, 2, 3, 4, 5];
      } else {
        // 4 choices: correct + 3 unique distractors from 11–20
        choices = buildDistractors(currentNumber, 11, 20, 4);
      }

      choices.forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = String(num);
        btn.setAttribute('aria-label', `Answer ${num}`);
        btn.addEventListener('click', () => handleAnswer(btn, num));
        answerRowEl.appendChild(btn);
      });
    }

    /* ── Build distractor set ─────────────────────────────────
       Returns `count` unique numbers from [min, max] that always
       include `correct`, in shuffled order.
    ─────────────────────────────────────────────────────────── */
    function buildDistractors(correct, min, max, count) {
      const pool = [];
      for (let i = min; i <= max; i++) {
        if (i !== correct) pool.push(i);
      }
      shuffle(pool);
      const chosen = [correct, ...pool.slice(0, count - 1)];
      shuffle(chosen);
      return chosen;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    /* ── Handle answer tap ───────────────────────────────────── */
    async function handleAnswer(btn, tapped) {
      if (isBusy) return;

      if (tapped === currentNumber) {
        // Correct!
        isBusy = true;
        btn.classList.add('correct');
        sessionCorrect++;
        correctSince++;

        // TTS praise
        speak(`Yes! ${currentNumber}!`, 0.88, 1.2);

        // Track progress
        addStars(1);
        increment(APP_ID, 'correct');
        markPracticed(APP_ID, String(currentNumber));

        // Update progress dots
        updateProgressDots(true);

        // Check for reward (every 5 correct)
        if (correctSince > 0 && correctSince % REWARD_EVERY === 0) {
          await delay(500);
          await showReward();
        }

        // Advance after brief pause
        await delay(800);
        nextQuestion();

      } else {
        // Wrong
        btn.classList.add('wrong');
        speak('Try again!', 0.88, 1.15);
        await delay(420);
        btn.classList.remove('wrong');
      }
    }

    /* ── Session progress dots ───────────────────────────────── */
    function updateProgressDots(markDone = false) {
      sessionProgressEl.innerHTML = '';
      for (let i = 0; i < SESSION_LEN; i++) {
        const dot = document.createElement('div');
        dot.className = 'session-dot';
        dot.setAttribute('role', 'listitem');
        if (i < sessionCorrect) {
          dot.classList.add('done');
          dot.setAttribute('aria-label', 'Correct');
        } else if (i === sessionCorrect && !markDone) {
          dot.classList.add('current');
          dot.setAttribute('aria-label', 'Current question');
        } else {
          dot.setAttribute('aria-label', 'Upcoming');
        }
        sessionProgressEl.appendChild(dot);
      }
    }

    /* ── Confetti ────────────────────────────────────────────── */
    function launchConfetti(count = 60) {
      const colors = ['#FF8C42','#FFB347','#FFE66D','#FF6B6B','#4ECDC4','#C9B1FF'];
      for (let i = 0; i < count; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: -20px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-delay: ${Math.random() * 1.2}s;
          animation-duration: ${1.8 + Math.random() * 1.5}s;
          transform: rotate(${Math.random() * 360}deg);
          border-radius: ${Math.random() > 0.5 ? '50%' : '3px'};
        `;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3500);
      }
    }

    /* ── Reward overlay ──────────────────────────────────────── */
    function showReward() {
      return new Promise(resolve => {
        rewardMsg.textContent = `Fantastic! ${correctSince} right!`;
        rewardOverlay.classList.add('visible');
        launchConfetti(70);
        speakPhrase(`Fantastic! ${correctSince} in a row!`);

        rewardContinue.onclick = () => {
          rewardOverlay.classList.remove('visible');
          resolve();
        };
      });
    }

    /* ── Session complete screen ─────────────────────────────── */
    function showSessionComplete() {
      launchConfetti(100);
      const stars = getStars();
      scStars.textContent = `You earned ⭐ ${sessionCorrect} star${sessionCorrect !== 1 ? 's' : ''} this round!`;
      sessionComplete.classList.add('visible');
      speakPhrase(`Amazing job! You got ${sessionCorrect} right! Great work!`);
    }

    playAgainBtn.addEventListener('click', () => {
      sessionComplete.classList.remove('visible');
      resetSession();
    });

    /* ── Utility ─────────────────────────────────────────────── */
    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    /* ── Init ────────────────────────────────────────────────── */
    resetSession();

  })();
  </script>
</body>
</html>
