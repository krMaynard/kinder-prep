name: story_generator
description: Personalized decodable book generator for early readers, powered by Gemini.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.6'

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  http: ^1.2.2
  path_provider: ^2.1.5
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
