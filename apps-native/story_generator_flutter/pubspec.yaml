name: story_generator
description: Personalized decodable book generator for early readers, powered by Gemini.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.6
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  http: ^1.2.2
  path_provider: ^2.1.5
  share_plus: ^10.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
